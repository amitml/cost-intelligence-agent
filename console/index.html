<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CostOp — Intelligence Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#F8F9FA;color:#111827;height:100vh;display:flex;flex-direction:column}
header{height:56px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#FFF;flex-shrink:0}
.brand{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:17px}.accent{color:#E65100}
.tag{font-size:11px;color:#9CA3AF;font-weight:500;margin-left:8px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;margin-right:6px}
.container{flex:1;display:flex;overflow:hidden}

/* Left: Alerts/Investigations list */
.left-panel{width:360px;border-right:1px solid #E5E7EB;background:#FFF;display:flex;flex-direction:column}
.panel-tabs{display:flex;border-bottom:1px solid #E5E7EB}
.panel-tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:600;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent}
.panel-tab.active{color:#E65100;border-bottom-color:#E65100}
.alert-list{flex:1;overflow-y:auto}
.alert-item{padding:14px 18px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .1s}
.alert-item:hover{background:#F9FAFB}
.alert-item.active{background:#FFF7ED;border-left:3px solid #E65100}
.alert-item .severity{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
.severity.critical{background:#EF4444}
.severity.warning{background:#F59E0B}
.severity.info{background:#3B82F6}
.alert-item .title{font-size:13px;font-weight:600;margin-bottom:3px}
.alert-item .meta{font-size:11px;color:#9CA3AF}
.alert-item .status-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;float:right}
.status-tag.investigating{background:#FEF3C7;color:#92400E}
.status-tag.resolved{background:#D1FAE5;color:#065F46}
.status-tag.new{background:#FEE2E2;color:#991B1B}

/* Right: Investigation detail + chat */
.right-panel{flex:1;display:flex;flex-direction:column;background:#F8F9FA}
.investigation-header{padding:16px 24px;background:#FFF;border-bottom:1px solid #E5E7EB}
.investigation-header h2{font-size:15px;font-weight:700;margin-bottom:4px}
.investigation-header .sub{font-size:12px;color:#6B7280}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px}
.msg{margin-bottom:14px;display:flex}
.msg.user{justify-content:flex-end}
.msg.agent{justify-content:flex-start}
.bubble{max-width:80%;padding:11px 16px;font-size:13px;line-height:1.6}
.msg.user .bubble{background:#111827;color:#FFF;border-radius:14px 14px 4px 14px}
.msg.agent .bubble{background:#FFF;border:1px solid #E5E7EB;border-radius:14px 14px 14px 4px}
.msg .time{font-size:10px;color:#9CA3AF;margin-top:3px;padding:0 4px}
.typing{display:none;padding:4px 24px;font-size:12px;color:#6B7280;font-style:italic}
.typing.active{display:block}
.input-bar{padding:12px 20px 16px;border-top:1px solid #E5E7EB;background:#FFF;display:flex;gap:8px}
.input-bar input{flex:1;border:1px solid #D1D5DB;border-radius:10px;padding:10px 14px;font-size:13px;font-family:inherit;outline:none}
.input-bar input:focus{border-color:#E65100;box-shadow:0 0 0 3px rgba(230,81,0,.06)}
.input-bar button{padding:10px 18px;border-radius:10px;border:none;background:#111827;color:#FFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.input-bar button:disabled{background:#D1D5DB}

/* Empty state */
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#9CA3AF;padding:40px}
.empty-state h3{font-size:16px;color:#374151;margin-bottom:8px}
.empty-state p{font-size:13px;text-align:center;max-width:300px}

/* New investigation button */
.new-btn{margin:12px 16px;padding:10px;border:1px dashed #D1D5DB;border-radius:8px;text-align:center;font-size:12px;color:#6B7280;cursor:pointer;font-family:inherit}
.new-btn:hover{border-color:#E65100;color:#E65100}
</style>
</head>
<body>
<header>
  <div><span class="brand">COST<span class="accent">OP</span></span><span class="tag">Intelligence Agent</span></div>
  <div style="font-size:12px;color:#6B7280"><span class="status-dot"></span>Connected • 5 alarms active</div>
</header>
<div class="container">
  <div class="left-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="showTab('alerts')">Alerts</div>
      <div class="panel-tab" onclick="showTab('investigations')">Investigations</div>
    </div>
    <div class="new-btn" onclick="newInvestigation()">+ New Investigation</div>
    <div class="alert-list" id="alertList"></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="empty-state" id="emptyState">
      <h3>Select an alert or start an investigation</h3>
      <p>Click an alert on the left to investigate, or start a new investigation to ask any cost question.</p>
    </div>
  </div>
</div>

<script>
const API='https://i7mkprsbm1.execute-api.us-east-1.amazonaws.com/ask';
let activeSession=null;
let threads={};

const alerts=[
  {id:'a1',severity:'critical',title:'Bedrock InputTokens > 200K/5min',detail:'Token usage spike detected',time:'2 min ago',status:'new'},
  {id:'a2',severity:'warning',title:'RPM > 100 invocations/min',detail:'order-processing Lambda sustained high rate',time:'15 min ago',status:'investigating'},
  {id:'a3',severity:'info',title:'TPM Quota at 82%',detail:'Approaching Claude Sonnet throttle limit',time:'1 hour ago',status:'new'},
  {id:'a4',severity:'warning',title:'Cost Anomaly: Bedrock +340%',detail:'Weekly spend $890 vs $210 baseline',time:'Yesterday',status:'investigating'},
  {id:'a5',severity:'critical',title:'May 4 Spike: $245 single day',detail:'Bedrock cost 40x normal daily usage',time:'May 4',status:'resolved'},
];

function renderAlerts(){
  const el=document.getElementById('alertList');
  el.innerHTML=alerts.map(a=>`
    <div class="alert-item ${activeSession===a.id?'active':''}" onclick="openAlert('${a.id}')">
      <span class="status-tag ${a.status}">${a.status}</span>
      <div class="title"><span class="severity ${a.severity}"></span>${a.title}</div>
      <div class="meta">${a.detail} • ${a.time}</div>
    </div>
  `).join('');
}

function openAlert(id){
  const alert=alerts.find(a=>a.id===id);
  activeSession=id;
  renderAlerts();
  if(!threads[id]){
    threads[id]={messages:[],started:false};
  }
  renderThread(id,alert);
  if(!threads[id].started){
    threads[id].started=true;
    autoInvestigate(id,alert);
  }
}

function newInvestigation(){
  const id='inv-'+Date.now();
  activeSession=id;
  threads[id]={messages:[],started:true};
  renderAlerts();
  const rp=document.getElementById('rightPanel');
  rp.innerHTML=`
    <div class="investigation-header"><h2>New Investigation</h2><div class="sub">Ask any cost question</div></div>
    <div class="chat-area" id="chat-${id}"></div>
    <div class="typing" id="typing">Investigating...</div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="e.g. Which agent costs the most? What changed today?" autocomplete="off" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="btn">Send</button>
    </div>
  `;
}

function renderThread(id,alert){
  const rp=document.getElementById('rightPanel');
  rp.innerHTML=`
    <div class="investigation-header">
      <h2>${alert.title}</h2>
      <div class="sub">${alert.detail} • Triggered ${alert.time}</div>
    </div>
    <div class="chat-area" id="chat-${id}">
      ${threads[id].messages.map(m=>`<div class="msg ${m.role}"><div class="bubble">${fmt(m.text)}</div><div class="time">${m.time}</div></div>`).join('')}
    </div>
    <div class="typing" id="typing">Investigating...</div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Ask follow-up..." autocomplete="off" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="btn">Send</button>
    </div>
  `;
  scrollChat(id);
}

async function autoInvestigate(id,alert){
  const query=`Investigate this alert: "${alert.title}" — ${alert.detail}. Check alarms, get real-time Bedrock usage, check what changed recently, look for similar patterns. Be concise with bullet points.`;
  document.getElementById('typing').classList.add('active');
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,sessionId:id})});
    const d=await r.json();
    addMsg(id,d.response||d.body||'No response','agent');
  }catch(e){addMsg(id,'Investigation timed out. Try asking a specific question.','agent')}
  document.getElementById('typing').classList.remove('active');
}

async function send(){
  const input=document.getElementById('input');
  const msg=input.value.trim();
  if(!msg||!activeSession)return;
  input.value='';
  addMsg(activeSession,msg,'user');
  document.getElementById('btn').disabled=true;
  document.getElementById('typing').classList.add('active');
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:msg+' Be concise.',sessionId:activeSession})});
    const d=await r.json();
    addMsg(activeSession,d.response||d.body||'No response','agent');
  }catch(e){addMsg(activeSession,'Request timed out. Try a simpler question.','agent')}
  document.getElementById('btn').disabled=false;
  document.getElementById('typing').classList.remove('active');
}

function addMsg(id,text,role){
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  threads[id].messages.push({role,text,time:now});
  const chat=document.getElementById('chat-'+id);
  if(chat){
    const div=document.createElement('div');
    div.className='msg '+role;
    div.innerHTML=`<div class="bubble">${fmt(text)}</div><div class="time">${now}</div>`;
    chat.appendChild(div);
    scrollChat(id);
  }
}

function scrollChat(id){const el=document.getElementById('chat-'+id);if(el)el.scrollTop=el.scrollHeight}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code style="background:#F3F4F6;padding:1px 5px;border-radius:3px;font-size:11px;font-family:JetBrains Mono,monospace">$1</code>')}
function showTab(t){document.querySelectorAll('.panel-tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='alerts'?0:1)))}

renderAlerts();
</script>
</body>
</html>
