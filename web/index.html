<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CostOp — Intelligence Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Space Grotesk',system-ui,sans-serif;background:#F8F9FA;color:#111827;height:100vh;display:flex;flex-direction:column}
header{height:56px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#FFF;flex-shrink:0}.brand{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:17px}.accent{color:#E65100}.tag{font-size:11px;color:#9CA3AF;font-weight:500;margin-left:8px}.status-dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;margin-right:6px}
.container{flex:1;display:flex;overflow:hidden}
.left-panel{width:320px;border-right:1px solid #E5E7EB;background:#FFF;display:flex;flex-direction:column}.left-panel h2{padding:14px 18px;font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #F3F4F6;font-weight:600}.alert-list{flex:1;overflow-y:auto;padding:6px 10px}.alert-item{padding:10px 14px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .1s}.alert-item:hover{background:#F9FAFB;border-color:#E5E7EB}.alert-item .severity{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px}.severity.critical{background:#EF4444}.severity.warning{background:#F59E0B}.severity.info{background:#3B82F6}.alert-item .title{font-size:12px;font-weight:600;margin-bottom:2px}.alert-item .meta{font-size:10px;color:#9CA3AF}
.right-panel{flex:1;display:flex;flex-direction:column;background:#F8F9FA}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px}
.msg{margin-bottom:12px;display:flex}.msg.user{justify-content:flex-end}.bubble{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.5}.msg.user .bubble{background:#111827;color:#FFF;border-radius:12px 12px 4px 12px}
.typing{display:none;padding:4px 24px;font-size:12px;color:#6B7280;font-style:italic}.typing.active{display:block}
.input-bar{padding:10px 20px 14px;border-top:1px solid #E5E7EB;background:#FFF;display:flex;gap:8px}.input-bar input{flex:1;border:1px solid #D1D5DB;border-radius:10px;padding:10px 14px;font-size:13px;font-family:inherit;outline:none}.input-bar input:focus{border-color:#E65100}.input-bar button{padding:10px 16px;border-radius:10px;border:none;background:#111827;color:#FFF;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}.input-bar button:disabled{background:#D1D5DB}
.login-overlay{position:fixed;inset:0;background:#F8F9FA;display:flex;align-items:center;justify-content:center;z-index:100}.login-box{background:#FFF;padding:36px;border-radius:12px;border:1px solid #E5E7EB;width:320px;text-align:center}.login-box h2{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:22px;margin-bottom:4px}.login-box p{color:#6B7280;font-size:12px;margin-bottom:18px}.login-box input{width:100%;padding:9px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit}.login-box button{width:100%;padding:9px;border:none;background:#111827;color:#FFF;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}.login-box .error{background:#FEF2F2;color:#DC2626;padding:6px;border-radius:6px;font-size:11px;margin-bottom:10px;display:none}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#9CA3AF;padding:40px}.empty-state h3{font-size:15px;color:#374151;margin-bottom:6px}.empty-state p{font-size:12px}
.new-btn{margin:10px 14px;padding:9px;border:1px dashed #D1D5DB;border-radius:8px;text-align:center;font-size:11px;color:#6B7280;cursor:pointer;font-family:inherit}.new-btn:hover{border-color:#E65100;color:#E65100}
.section-label{padding:10px 14px 4px;font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-top:1px solid #F3F4F6;margin-top:4px}
/* Structured response styles */
.investigation-result{padding:4px}
.result-summary{background:#FFF;border:1px solid #E5E7EB;border-left:3px solid #E65100;border-radius:8px;padding:14px 16px;font-size:14px;font-weight:500;margin-bottom:16px;line-height:1.5}
.result-section{margin-bottom:16px}.result-section h4{font-size:12px;color:#6B7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.findings-grid{display:flex;flex-wrap:wrap;gap:8px}.finding-card{background:#FFF;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.4;flex:1;min-width:200px}.finding-card.danger{border-left:3px solid #EF4444;background:#FEF2F2}
.action-buttons{display:flex;flex-wrap:wrap;gap:8px}.action-btn{padding:8px 14px;border-radius:8px;border:1px solid #E5E7EB;background:#FFF;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .1s}.action-btn:hover{border-color:#111827;background:#F9FAFB}.action-btn.destructive{border-color:#FCA5A5;color:#DC2626}.action-btn.destructive:hover{background:#FEF2F2}
.timeline{border-left:2px solid #E5E7EB;padding-left:16px;margin-left:8px}.timeline-item{margin-bottom:8px;font-size:12px;display:flex;gap:8px}.tl-time{color:#6B7280;font-family:'JetBrains Mono',monospace;font-size:11px;min-width:60px}.tl-event{color:#374151}
.raw-response{background:#FFF;border:1px solid #E5E7EB;border-radius:8px;padding:16px;font-size:13px;line-height:1.7;max-height:400px;overflow-y:auto}.raw-response code{background:#F3F4F6;padding:1px 5px;border-radius:3px;font-size:11px;font-family:'JetBrains Mono',monospace}.raw-response h3{font-size:14px;margin:12px 0 6px}.raw-response h4{font-size:13px;margin:10px 0 4px}
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>COST<span class="accent">OP</span></h2>
    <p>Intelligence Agent</p>
    <div class="error" id="loginError"></div>
    <input type="text" id="emailInput" placeholder="Username" value="testuser"/>
    <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Sign In</button>
  </div>
</div>
<header>
  <div><span class="brand">COST<span class="accent">OP</span></span><span class="tag">Intelligence Agent</span></div>
  <div style="font-size:11px;color:#6B7280"><span class="status-dot"></span>Live</div>
</header>
<div class="container">
  <div class="left-panel">
    <h2>Live Alerts</h2>
    <div class="new-btn" onclick="newChat()">+ New Investigation</div>
    <div class="alert-list" id="alertList"><div style="padding:16px;color:#9CA3AF;font-size:12px">Login to load alerts</div></div>
  </div>
  <div class="right-panel">
    <div class="chat-area" id="chatArea">
      <div class="empty-state"><h3>Select an alert or start an investigation</h3><p>Click an alert to investigate, or type a question below.</p></div>
    </div>
    <div class="typing" id="typing">Investigating...</div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="Ask about costs, agents, anomalies..." autocomplete="off" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="btn">Send</button>
    </div>
  </div>
</div>
<script type="module" src="/main.js"></script>
</body>
</html>
